name:       comp2322-coursework
version:    0.1.0.0
github:     "githubuser/comp2322-coursework"
license:    BSD-3-Clause
author:     "jb5g24, sh6n24, ssa1g24"
maintainer: "jb5g24, sh6n24, ssa1g24"
copyright:  "University of Southampton 2026"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package:
# synopsis: Short description of your package
# category: Web

description: comp2322 coursework

dependencies:
  - base >= 4.7 && < 5
  - array
  - containers

build-tools:
  - alex
  - happy

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src

executables:
  comp2322-coursework-exe:
    main:                Main.hs
    source-dirs:
      - app
      - src
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - comp2322-coursework

tests:
  comp2322-coursework-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - comp2322-coursework
